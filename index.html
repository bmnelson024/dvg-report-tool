<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quarterly Report Builder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Inter, sans-serif; background: #ffffff; color: #1a1400; min-height: 100vh; }
  .container { max-width: 860px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; }
  .subtitle { color: #7a6420; font-size: 14px; margin-top: 4px; }
  .steps { display: flex; margin: 24px 0; }
  .step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .step-circle { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; background: #e5e7eb; color: #9ca3af; }
  .step-circle.active { background: #1a1400; color: white; }
  .step-circle.done { background: #22c55e; color: white; }
  .step-label { font-size: 11px; color: #9ca3af; text-align: center; }
  .step-label.active { color: #1a1400; font-weight: 600; }
  .section-label { font-size: 12px; font-weight: 700; color: #1a1400; text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 8px; }
  .file-row { border: 2px dashed #d1d5db; border-radius: 10px; padding: 12px 16px; background: #fafafa; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; transition: all 0.2s; }
  .file-row.done { border-color: #22c55e; background: #fffbef; }
  .file-row-label { font-weight: 600; font-size: 13px; }
  .file-badge { margin-left: 6px; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
  .badge-excel { background: #dcfce7; color: #16a34a; }
  .badge-csv { background: #eff6ff; color: #3b82f6; }
  .file-hint { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .upload-btn { background: #1a1400; color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; white-space: nowrap; flex-shrink: 0; border: none; }
  .upload-btn.done { background: #22c55e; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .chart-row { border: 2px dashed #d1d5db; border-radius: 8px; padding: 10px 14px; background: #fafafa; display: flex; align-items: center; justify-content: space-between; gap: 10; margin: 0; transition: all 0.2s; }
  .chart-row.done { border-color: #22c55e; background: #fffbef; }
  .chart-label { font-weight: 600; font-size: 12px; }
  .chart-filename { font-size: 10px; color: #9ca3af; margin-top: 1px; font-family: monospace; }
  .chart-thumb { width: 48px; height: 32px; object-fit: cover; border-radius: 4px; border: 1px solid #d1d5db; }
  .econ-box { background: #fdf8ec; border-radius: 10px; padding: 16px; border: 1px solid #e8d49a; margin-bottom: 8px; }
  .econ-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 10px; }
  .econ-input-wrap { display: flex; align-items: center; border: 1px solid #e8d49a; border-radius: 6px; background: white; overflow: hidden; }
  .econ-input { flex: 1; padding: 8px 10px; border: none; outline: none; font-size: 14px; font-family: Inter, sans-serif; }
  .econ-pct { padding: 8px 10px; background: #fdf8ec; color: #7a6420; font-size: 13px; font-weight: 600; }
  .econ-avg { margin-top: 10px; font-size: 12px; color: #96771f; font-weight: 600; }
  .photo-box { background: #fdf8ec; border-radius: 10px; padding: 16px; border: 1px solid #e8d49a; margin-bottom: 8px; }
  .process-btn { margin-top: 12px; width: 100%; padding: 12px 0; border-radius: 8px; border: none; background: #1a1400; color: white; font-weight: 700; font-size: 15px; cursor: pointer; font-family: Inter, sans-serif; }
  .process-btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
  .error-box { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; color: #dc2626; font-size: 13px; }
  .metric-box { background: #fdf8ec; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
  .metric-box-title { font-size: 12px; font-weight: 700; color: #1a1400; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: right; padding: 6px 8px; color: #7a6420; font-weight: 600; border-bottom: 2px solid #e8d49a; }
  th:first-child { text-align: left; }
  td { padding: 8px; border-bottom: 1px solid #e8d49a; }
  td:not(:first-child) { text-align: right; }
  .occ-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
  .occ-card { background: white; border: 1px solid #e8d49a; border-radius: 8px; padding: 10px 12px; text-align: center; }
  .occ-card.highlight { background: #1a1400; border-color: #1a1400; }
  .occ-card-label { font-size: 11px; color: #7a6420; font-weight: 600; }
  .occ-card.highlight .occ-card-label { color: #B8942A; }
  .occ-card-value { font-size: 20px; font-weight: 700; color: #1a1400; margin-top: 4px; }
  .occ-card.highlight .occ-card-value { color: white; }
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi-card { background: white; border: 1px solid #e8d49a; border-radius: 8px; padding: 10px 14px; }
  .kpi-label { font-size: 11px; color: #7a6420; font-weight: 600; text-transform: uppercase; }
  .kpi-value { font-size: 18px; font-weight: 700; color: #1a1400; margin-top: 4px; }
  .capex-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #e8d49a; font-size: 13px; }
  .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .btn-back { flex: 1; padding: 10px 0; border-radius: 8px; border: 1px solid #e8d49a; background: white; font-weight: 600; cursor: pointer; font-family: Inter, sans-serif; font-size: 14px; }
  .btn-next { flex: 2; padding: 10px 0; border-radius: 8px; border: none; background: #1a1400; color: white; font-weight: 700; cursor: pointer; font-family: Inter, sans-serif; font-size: 14px; }
  .narrative-label { font-weight: 600; font-size: 13px; color: #1a1400; display: block; margin-bottom: 4px; }
  .auto-badge { font-size: 10px; background: #fdf8ec; color: #96771f; padding: 2px 8px; border-radius: 4px; font-weight: 600; float: right; }
  textarea { width: 100%; min-height: 80px; padding: 10px; border: 1px solid #e8d49a; border-radius: 8px; font-size: 13px; font-family: Inter, sans-serif; resize: vertical; box-sizing: border-box; background: #fffdf5; margin-bottom: 14px; }
  .charts-info { background: #fdf8ec; border: 1px solid #e8d49a; border-radius: 10px; padding: 14px; margin-bottom: 16px; font-size: 13px; color: #1a1400; }
  .gen-btn { width: 100%; padding: 12px 0; border-radius: 8px; border: none; background: #1a1400; color: white; font-weight: 700; font-size: 15px; cursor: pointer; font-family: Inter, sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .gen-btn:disabled { background: #96771f; cursor: not-allowed; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .report-ready-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; }
  .print-instructions { background: #fdf8ec; border: 1px solid #e8d49a; border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 13px; color: #1a1400; }
  .print-instructions ol { padding-left: 18px; line-height: 2; margin-top: 6px; }
  iframe { width: 100%; height: 820px; border: 1px solid #e8d49a; border-radius: 8px; }
  .new-quarter-btn { margin-top: 10px; width: 100%; padding: 10px 0; border-radius: 8px; border: none; background: #1a1400; color: white; font-weight: 700; font-size: 14px; cursor: pointer; font-family: Inter, sans-serif; }
  .home-card { background: white; border: 1px solid #e8d49a; border-radius: 12px; padding: 16px 20px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; transition: border-color 0.15s; }
  .home-card:hover { border-color: #1a1400; }
  .home-prop { font-weight: 700; font-size: 14px; color: #1a1400; }
  .home-meta { font-size: 12px; color: #7a6420; margin-top: 3px; }
  .home-resume-btn { background: #1a1400; color: white; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; white-space: nowrap; }
  .home-delete-btn { background: white; color: #dc2626; border: 1px solid #fca5a5; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .save-btn { background: #fdf8ec; color: #96771f; border: 1px solid #e8d49a; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .save-btn:hover { background: #e8d49a; }
  .all-reports-link { font-size: 12px; color: #7a6420; cursor: pointer; text-decoration: underline; margin-bottom: 6px; display: inline-block; }
  .all-reports-link:hover { color: #1a1400; }
  .btn-home { background: white; color: #1a1400; border: 1.5px solid #e8d49a; border-radius: 7px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: Inter, sans-serif; }
  .btn-home:hover { border-color: #1a1400; background: #fffbef; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1400; color: white; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; box-shadow: 0 4px 12px rgba(184,148,42,0.25); }
  .toast.show { opacity: 1; }
  .save-modal-overlay { display:none; position:fixed; inset:0; background:rgba(26,20,0,0.45); z-index:10000; align-items:center; justify-content:center; }
  .save-modal-overlay.show { display:flex; }
  .save-modal { background:white; border-radius:14px; padding:28px 28px 22px; max-width:360px; width:90%; box-shadow:0 8px 32px rgba(26,20,0,0.22); text-align:center; }
  .save-modal-icon { font-size:32px; margin-bottom:10px; }
  .save-modal h3 { font-size:17px; font-weight:700; color:#1a1400; margin-bottom:8px; }
  .save-modal p { font-size:13px; color:#7a6420; line-height:1.6; margin-bottom:20px; }
  .save-modal-btns { display:flex; flex-direction:column; gap:8px; }
  .save-modal-btns .btn-save-go { background:#1a1400; color:white; border:none; border-radius:8px; padding:11px 0; font-size:14px; font-weight:700; cursor:pointer; font-family:Inter,sans-serif; }
  .save-modal-btns .btn-skip { background:white; color:#7a6420; border:1px solid #e8d49a; border-radius:8px; padding:9px 0; font-size:13px; font-weight:600; cursor:pointer; font-family:Inter,sans-serif; }
  .save-modal-btns .btn-skip:hover { background:#fffbef; }
</style>
</head>
<body>
<div class="container">
  <div style="margin-bottom:20px">
    <h1 style="display:flex;align-items:center;gap:12px;"><img id="lw-header-logo" style="height:40px;width:auto;" alt=""/><span>Quarterly Report Builder</span></h1>
    <div class="subtitle">Quarterly Report Tool</div>
  </div>
  <div id="home-link"></div>
  <div class="steps" id="steps-indicator"></div>
  <div id="error-box" class="error-box" style="display:none"></div>
  <div id="step-content"></div>
</div>
<script>
// Global error handler - shows errors visibly on page for remote debugging
window.onerror=function(msg,src,line,col,err){
  const d=document.getElementById('step-content');
  if(d) d.innerHTML='<div style="color:red;padding:20px;font-family:monospace;background:#fff0f0;border:2px solid red;border-radius:8px;margin:20px 0"><strong>JavaScript Error:</strong><br>'+msg+'<br><small>'+src+':'+line+'</small></div>';
  return false;
};
// ─── XLSX LOADER — load on demand so it never blocks page render ─────────────
let _xlsxLoaded=false, _xlsxLoading=false, _xlsxQueue=[];
function ensureXLSX(cb){
  if(_xlsxLoaded){cb();return;}
  _xlsxQueue.push(cb);
  if(_xlsxLoading) return;
  _xlsxLoading=true;
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=()=>{_xlsxLoaded=true;_xlsxLoading=false;_xlsxQueue.forEach(f=>f());_xlsxQueue=[];};
  s.onerror=()=>{_xlsxLoading=false;_xlsxQueue.forEach(f=>f());_xlsxQueue=[];};
  document.head.appendChild(s);
}

// ─── STORAGE LAYER ────────────────────────────────────────────────────────────
// Reads are synchronous from an in-memory cache loaded at startup.
// Writes update the cache immediately and persist to IndexedDB asynchronously.
// Falls back silently if IndexedDB is unavailable.
let _idb = null;
const _dbCache = {};

function idbInit(cb){
  let called=false;
  function done(){if(!called){called=true;cb();}}
  // Safety net: if IDB hangs for any reason, render anyway after 2s
  setTimeout(done,2000);
  try{
    if(!window.indexedDB){done();return;}
    const req=indexedDB.open('leavenwealth_db',1);
    req.onupgradeneeded=e=>{
      try{e.target.result.createObjectStore('items');}catch(e2){}
    };
    req.onsuccess=e=>{
      try{
        _idb=e.target.result;
        if(navigator.storage&&navigator.storage.persist) navigator.storage.persist();
        const tx=_idb.transaction('items','readonly');
        const store=tx.objectStore('items');
        const keysReq=store.getAllKeys(), valsReq=store.getAll();
        let keys=null, vals=null;
        keysReq.onsuccess=()=>{keys=keysReq.result; if(vals!==null) build();};
        valsReq.onsuccess=()=>{vals=valsReq.result; if(keys!==null) build();};
        keysReq.onerror=()=>done();
        valsReq.onerror=()=>done();
        function build(){try{keys.forEach((k,i)=>{_dbCache[k]=vals[i];});}catch(e3){}done();}
        tx.onerror=()=>done();
        tx.onabort=()=>done();
      }catch(e2){done();}
    };
    req.onerror=()=>done();
    req.onblocked=()=>done();
  }catch(e){done();}
}

function dbGet(k){return Object.prototype.hasOwnProperty.call(_dbCache,k)?_dbCache[k]:null;}
function dbSet(k,v){
  _dbCache[k]=v;
  if(!_idb)return;
  try{const req=_idb.transaction('items','readwrite').objectStore('items').put(v,k);req.onerror=()=>console.warn('IDB write failed for key:',k,req.error);}catch(e){console.warn('IDB write exception for key:',k,e);}
}
function dbRemove(k){
  delete _dbCache[k];
  if(!_idb)return;
  try{_idb.transaction('items','readwrite').objectStore('items').delete(k);}catch(e){}
}
function dbKeys(){return Object.keys(_dbCache);}

// One-time migration: copy any lw_* keys from localStorage → IndexedDB then remove them
function migrateLegacyData(){
  try{
    const toMigrate=[];
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('lw_'))toMigrate.push(k);}
    if(toMigrate.length===0)return;
    toMigrate.forEach(k=>{const v=localStorage.getItem(k);if(v!=null)dbSet(k,v);});
    toMigrate.forEach(k=>localStorage.removeItem(k));
    console.log('LeavenWealth: migrated '+toMigrate.length+' items localStorage → IndexedDB');
  }catch(e){}
}

function downloadBackup(){
  try{
    const blob=new Blob([JSON.stringify(_dbCache)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='leavenwealth-backup-'+new Date().toISOString().slice(0,10)+'.json';
    a.click(); URL.revokeObjectURL(url);
  }catch(e){showError('Could not create backup: '+e.message);}
}

function restoreBackup(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const n=Object.keys(data).length;
        dbKeys().forEach(k=>dbRemove(k));
        Object.entries(data).forEach(([k,v])=>dbSet(k,v));
        showToast('✓ Backup restored — '+n+' items loaded');
        state.showHome=true;render();
      }catch(e2){showError('Could not read backup file: '+e2.message);}
    };
    r.readAsText(f);
  };
  inp.click();
}

function getSavesIndex(){try{return JSON.parse(dbGet(SAVES_INDEX_KEY)||"[]");}catch(e){return[];}}
function saveKey(name,quarter){return(name+"_"+quarter).replace(/[^a-z0-9]/gi,"_").toLowerCase();}
function saveChartsForKey(k,charts){if(!k)return;dbSet(CHARTS_PREFIX+k,JSON.stringify(charts));}
function loadChartsForKey(k){if(!k)return null;try{const d=dbGet(CHARTS_PREFIX+k);return d?JSON.parse(d):null;}catch(e){return null;}}
function saveInvChartsForKey(k,charts){if(!k)return;dbSet(INV_CHARTS_PREFIX+k,JSON.stringify(charts));}
function loadInvChartsForKey(k){if(!k)return null;try{const d=dbGet(INV_CHARTS_PREFIX+k);return d?JSON.parse(d):null;}catch(e){return null;}}
// ── File persistence helpers ─────────────────────────────────────────────────
// ArrayBuffers (Excel files) are serialized to base64; strings (CSVs) stored as-is.
function _bufToB64(buf){const b=new Uint8Array(buf);let s='';const c=8192;for(let i=0;i<b.length;i+=c)s+=String.fromCharCode.apply(null,b.subarray(i,i+c));return btoa(s);}
function _b64ToBuf(b64){const b=atob(b64);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a.buffer;}
function _serializeFiles(files){if(!files)return null;const out={};Object.entries(files).forEach(([k,v])=>{if(!v)out[k]=null;else if(v instanceof ArrayBuffer)out[k]={t:'buf',d:_bufToB64(v)};else out[k]={t:'str',d:v};});return out;}
function _deserializeFiles(ser){if(!ser)return null;const out={};Object.entries(ser).forEach(([k,v])=>{if(!v)out[k]=null;else if(v.t==='buf')out[k]=_b64ToBuf(v.d);else out[k]=v.d;});return out;}
function saveFilesForKey(k,files){if(!k)return;try{dbSet(FILES_PREFIX+k,JSON.stringify(_serializeFiles(files)));}catch(e){console.warn('File save failed:',e);}}
function loadFilesForKey(k){if(!k)return null;try{const d=dbGet(FILES_PREFIX+k);return d?_deserializeFiles(JSON.parse(d)):null;}catch(e){return null;}}
function saveInvFilesForKey(k,props){if(!k)return;try{const out={};(props||[]).forEach(p=>{if(p.files)out[p.id]=_serializeFiles(p.files);});dbSet(INV_FILES_PREFIX+k,JSON.stringify(out));}catch(e){console.warn('Inv file save failed:',e);}}
function loadInvFilesForKey(k){if(!k)return{};try{const d=dbGet(INV_FILES_PREFIX+k);return d?JSON.parse(d):{};}catch(e){return{};}}
function applyInvFiles(props,serialized){(props||[]).forEach(p=>{const s=serialized[p.id];if(s)p.files={...(p.files||{}),..._deserializeFiles(s)};});}
// Current save key for the active report
function currentSaveKey(){const isInv=state.source==='investment';const name=isInv?(state.investmentName||"investment"):(state.propertyName||"unnamed");return saveKey(name,state.currentQuarter||"unknown");}
// Returns all single-property saves that have metrics saved
function getSinglePropertySaves(){
  return getSavesIndex().filter(s=>s.source!=='investment').map(s=>{
    try{const d=JSON.parse(dbGet(SAVE_PREFIX+s.key)||"null");return d&&d.metrics?{key:s.key,propertyName:s.propertyName,quarter:s.quarter,metrics:d.metrics}:null;}catch(e){return null;}
  }).filter(Boolean);
}
function importPropertyFromSave(propId,saveKey){
  const prop=state.invProperties.find(p=>p.id===propId);
  if(!prop) return;
  try{
    const d=JSON.parse(dbGet(SAVE_PREFIX+saveKey)||"null");
    if(!d||!d.metrics){showError("Could not load metrics from that save.");return;}
    // Patch unitCount from assetFacts.units if the saved metrics don't have it
    // (old saves made before unitCount was tracked in state.metrics)
    if(!d.metrics.unitCount && d.assetFacts && d.assetFacts.units){
      const parsedUnits=parseInt(String(d.assetFacts.units).replace(/[^\d]/g,""));
      if(!isNaN(parsedUnits)&&parsedUnits>0) d.metrics={...d.metrics,unitCount:parsedUnits};
    }
    prop.metrics=d.metrics;
    prop._imported=true;
    prop._importedFrom=saveKey;
    prop._showImportPicker=false;
    if(!prop.name && d.propertyName) prop.name=d.propertyName;
    if(!prop.source && d.source) prop.source=d.source;
    render();
  }catch(e){showError("Import failed: "+e.message);}
}
function showInvImportPicker(propId){
  const prop=state.invProperties.find(p=>p.id===propId);

function processInvestmentData(){
  try{
    showError("");

      try{
        if(prop._imported && prop.metrics){

            const importedQ=(prop._importedFrom||"").replace(/^[^_]*_/,"").replace(/_/g," ").trim();
            const normImported=importedQ.toLowerCase();
            if(normImported && !normImported.includes(currentQ) && !currentQ.includes(normImported)){
              propErrors.push("\""+prop.name+"\": imported metrics may be from a different quarter ("+importedQ+") — verify or re-import");
            }
          }
          results.push(prop.metrics);
        }
        else{ prop.metrics=parsePropertyMetrics(prop); results.push(prop.metrics); }
      }
      catch(e){ propErrors.push("\""+prop.name+"\": "+e.message); prop.metrics=null; }
    }
    if(propErrors.length) showError("Warning: "+propErrors.length+" propert"+(propErrors.length>1?"ies":"y")+" skipped due to errors — "+propErrors.join("; "));
    if(!results.length){showError("Error: No properties could be processed. Check your uploaded files.");return;}
    // Warn if any property has no unit count — user can re-save single-property report or enter units in Asset Facts
    const missingUnits=results.filter(m=>!m.unitCount).map(m=>m.name||"unnamed");
    if(missingUnits.length) showError("Warning: Unit count missing for "+missingUnits.join(", ")+" — open each single-property report, enter '# of Units' in Asset Facts, and re-save. Total Units will show '—' until corrected.");
    const totalIncome=results.reduce((s,m)=>s+m.totalIncome,0);
    const totalExpense=results.reduce((s,m)=>s+m.totalExpense,0);
    const noi=results.reduce((s,m)=>s+m.noi,0);
    const delinquency=results.reduce((s,m)=>s+m.delinquency,0);
    const newLeases=results.reduce((s,m)=>s+(m.newLeases||0),0);
    const renewals=results.reduce((s,m)=>s+(m.renewals||0),0);
    const inquiries=results.reduce((s,m)=>s+(m.inquiries||0),0);
    const applications=results.reduce((s,m)=>s+(m.applications||0),0);
    const lossToLease=results.reduce((s,m)=>s+(m.lossToLease||0),0);
    // Unit-weighted occupancy: weight each property's occupancy by its unit count
    const totalUnitsPortfolio=results.reduce((s,m)=>s+(m.unitCount||0),0);
    const occupancy=totalUnitsPortfolio>0
      ? Math.round(results.reduce((s,m)=>s+(m.occupancy*(m.unitCount||0)),0)/totalUnitsPortfolio)
      : (results.length>0?Math.round(results.reduce((s,m)=>s+m.occupancy,0)/results.length):0);
    const econOccs=results.filter(m=>m.avgEconOcc).map(m=>parseFloat(m.avgEconOcc));
    const avgEconOcc=econOccs.length>0?Math.round(econOccs.reduce((s,v)=>s+v,0)/econOccs.length).toString():null;

function processData() {

function processDataAppFolio() {
  try {
    showError("");

    // ── Income Statement (Excel) — use parseQuarterFromExcel for AppFolio 12-month statements
    // so we sum only the 3 current-quarter months rather than the full-year "Total" column.
    const parsed = parseQuarterFromExcel(state.files.income, state.currentQuarter||"");
    if(!parsed) { showError("Could not parse Income Statement. Make sure you uploaded a 12-month AppFolio statement and the quarter is set correctly."); return; }
    const { totalIncome, totalExpense, noi, capex, capexItems, incomeRows, monthCols } = parsed;
    if (!totalIncome && !totalExpense) { showError("Could not parse Income Statement. Please check the Excel file."); return; }

    // ── Rent Rolls — occupancy ───────────────────────────────────────────────
    const calcOccAF = csv => {
      const rows = parseDelim(csv);
      // Find the summary row "XX Units" at the bottom
      const summaryRow = rows.find(r => /\d+\s*units?/i.test(r["Unit"]||""));
      if (summaryRow) {
        // Parse "98.6% Occupied" from Status column
        const pct = parseFloat((summaryRow["Status"]||"").replace("%",""));
        if (!isNaN(pct)) return Math.round(pct);
      }
      // Fallback: count vacant rows
      const totalRows = rows.filter(r => r["Unit"] && !/units?$/i.test(r["Unit"]||"") && r["Status"]);
      const vacantCount = totalRows.filter(r => /vacant/i.test(r["Status"]||"")).length;
      const totalCount = totalRows.length;
      return totalCount > 0 ? Math.round(((totalCount - vacantCount) / totalCount) * 100) : 0;
    };
    const occ1 = calcOccAF(state.files.rr1);
    const occ2 = calcOccAF(state.files.rr2);
    const occ3 = calcOccAF(state.files.rr3);
    const occupancy = Math.round((occ1 + occ2 + occ3) / 3);

    // ── Rent Roll — Loss to Lease & Rent Roll display ────────────────────────
    const finalRows = parseDelim(state.files.rr3).filter(r => {
      const u = (r["Unit"]||"").trim();
      return u && !/^\d+\s*units?$/i.test(u) && !/^total/i.test(u) && !/^->/.test(u) && u.length < 50;
    });
    let mkt=0, act=0;
    finalRows.forEach(r => {
      const status = (r["Status"]||"").toUpperCase();
      if (!status.includes("VACANT")) {
        mkt += parseCur(r["Market Rent"]||r["MarketRent"]||r["Mkt Rent"]||0);  // FIX: handle camelCase export variant
        act += parseCur(r["Rent"]||0);
      }
    });

    // Rent Roll display columns
    const RR_COLS_AF = [
      {label:"Unit",       pat:/^unit$/i},
      {label:"Bed/Bath",   pat:/^bd\/ba$/i},
      {label:"Lease From", pat:/^lease\s*from$/i},
      {label:"Lease To",   pat:/^lease\s*to$/i},
      {label:"Market Rent", pat:/^market\s*rent$/i},
      {label:"Rent",       pat:/^rent$/i},
    ];
    const rrAllHeaders = Object.keys(finalRows[0]||{});
    if(!finalRows.length) showError("Warning: AppFolio rent roll (Month 3) had no unit rows after filtering. The rent roll section will be empty — verify the CSV column headers.");
    const rrColMap = RR_COLS_AF.map(c=>({label:c.label, src:rrAllHeaders.find(h=>c.pat.test(h.trim()))||null})).filter(c=>c.src);
    const rrHeaders = rrColMap.map(c=>c.label);
    const statusHeader = rrAllHeaders.find(h=>/^status$/i.test(h.trim()))||null;
    const rentRollRows = finalRows
      .map(r=>{const o={};rrColMap.forEach(c=>o[c.label]=r[c.src]??"");o.__vacant=!!(statusHeader&&(r[statusHeader]||"").toUpperCase().includes("VACANT"));return o;})
      .sort((a,b)=>a.__vacant===b.__vacant?0:a.__vacant?1:-1);

    // ── Delinquency ──────────────────────────────────────────────────────────
    // From "Delinquency As Of" report — Total row, Amount Receivable column
    let delinquency = 0;
    const delinqRows = parseDelim(state.files.delinquency||"");
    const delinqTotal = delinqRows.find(r => /^total$/i.test((r["Unit"]||r["Name"]||"").trim()));
    if (delinqTotal) {
      delinquency = parseCur(delinqTotal["Amount Receivable"]||0);
    } else {
      // Fallback: sum all Amount Receivable values (skip property header row)
      delinqRows.forEach(r => {
        const amt = parseCur(r["Amount Receivable"]||0);
        if (amt > 0) delinquency += amt;
      });
    }

    // ── Leasing Summary ──────────────────────────────────────────────────────
    // Columns: Unit Type, # of Units, # of Model Units, Inquiries Received,
    //          Showings Completed, Applications Received, Move Ins, Move Outs, Leased
    let newLeases=0, inquiries=0, applications=0;
    const leasingRows = parseDelim(state.files.leasingSummary||state.files.leasing||"");
    const leasingTotal = leasingRows.find(r => /^total/i.test(r["Unit Type"]||""));
    if (leasingTotal) {
      newLeases    = parseInt(leasingTotal["Leased"]||0)||0;
      inquiries    = parseInt(leasingTotal["Inquiries Received"]||0)||0;
      applications = parseInt(leasingTotal["Applications Received"]||0)||0;
    } else {
      // Fallback: sum all non-header rows
      leasingRows.forEach(r => {
        newLeases    += parseInt(r["Leased"]||0)||0;
        inquiries    += parseInt(r["Inquiries Received"]||0)||0;
        applications += parseInt(r["Applications Received"]||0)||0;
      });
    }

    // ── Renewal Summary ──────────────────────────────────────────────────────
    // Format varies: "Total X Offers", "Total Offers: X", tabular with Count/Renewals column
    let renewals = 0;
    const renewalText = state.files.renewalSummary||"";
    const totalMatch = renewalText.match(/Total\s+(\d+)\s+Offers/i)
      || renewalText.match(/Total\s+Offers[:\s]+(\d+)/i)
      || renewalText.match(/(\d+)\s+Total\s+Offers/i);
    if (totalMatch) {
      renewals = parseInt(totalMatch[1])||0;
    } else {
      // Fallback 1: count rows with Status = "Renewed"
      const renewalRows = parseDelim(renewalText);
      const renewedCount = renewalRows.filter(r=>/renewed/i.test(r["Status"]||"")).length;
      if(renewedCount>0){ renewals=renewedCount; }
      else {
        // Fallback 2: sum a numeric "Count", "Renewals", or "Offers" column
        const colNames=["Count","Renewals","Offers","# Renewals","Total"];
        renewalRows.forEach(r=>{
          for(const col of colNames){ const v=parseInt(r[col]||""); if(!isNaN(v)&&v>0){renewals+=v;break;} }
        });
        if(renewals===0) showError("Warning: Could not parse renewal count from the Renewal Summary file — renewals will show as 0. Verify the file format.");
      }
    }

    // ── Trial Balance — Cash on Hand ─────────────────────────────────────────
    // Find row where GL Account is exactly "1150" (or starts "1150 ", "1150-", "1150:")
    let cashOnHand = 0;
    const _tbData=state.files.trialBalance||state.files.bank||"";
    const trialRows = parseDelim(_tbData);
    const cashRow = trialRows.find(r => {const gl=(r["GL Account"]||"").trim();return gl==="1150"||/^1150[\s\-:]/.test(gl);});
    if (cashRow) {
      cashOnHand = parseCur(cashRow["Ending Balance"]||0);
    } else {
      // Fallback to old bank file format
      const br = trialRows[0]||{};
      cashOnHand = parseCur(br["Balance"]||br["Cash Balance"]||br["cashAmount"]||0);
    }
    if(cashOnHand===0) showError("Warning: Cash on Hand resolved to $0. Verify the Trial Balance file contains a row with GL Account 1150 (Operating Account).");

    // ── Prior Quarter from 12-Month Income Statement ──────────────────────────
    // Financial data (income, expenses, NOI, capex) comes from the Excel.
    // Occupancy comes from state.prevOccupancyInput (manually entered or auto-loaded from a saved report).
    const parsedPrev = parsePriorQuarterFromExcel(state.files.income, state.currentQuarter||"");
    if(parsedPrev){
      const rawPrevOcc = state.prevOccupancyInput ? state.prevOccupancyInput.replace(/[^0-9.]/g,"") : "";
      const prevOcc = rawPrevOcc ? Math.round(parseFloat(rawPrevOcc)) : 0;
      if(state.prevOccupancyInput && !rawPrevOcc) showError("Warning: Prior occupancy value \""+state.prevOccupancyInput+"\" is not a valid number. Defaulting to 0%.");
      state.prevMetrics = {occupancy:prevOcc, income:parsedPrev.income, expenses:parsedPrev.expenses, noi:parsedPrev.noi, capex:parsedPrev.capex, expenseCategories:parsedPrev.expenseCategories||[]};
      state.prevQuarterLabel = parsedPrev.prevLabel;
    } else if(state.prevOccupancyInput || state.prevMetrics) {
      const rawPrevOcc = state.prevOccupancyInput ? state.prevOccupancyInput.replace(/[^0-9.]/g,"") : "";
      const prevOccBu2 = rawPrevOcc ? Math.round(parseFloat(rawPrevOcc)) : (state.prevMetrics ? state.prevMetrics.occupancy : 0);
      if(state.prevMetrics) state.prevMetrics.occupancy = prevOccBu2;
      else if(prevOccBu2) state.prevMetrics = {occupancy:prevOccBu2, income:0, expenses:0, noi:0, capex:0};
    }

    // ── Economic Occupancy ───────────────────────────────────────────────────
    const {m1,m2,m3} = state.econOcc;
    const avgEconOcc = (m1&&m2&&m3) ? Math.round((parseFloat(m1)+parseFloat(m2)+parseFloat(m3))/3).toString() : null;

    state.metrics = {occupancy,occ1,occ2,occ3,unitCount:finalRows.length,totalIncome,totalExpense,noi,capex,cashOnHand,lossToLease:calcLossToLease(mkt,act),monthlyRent:act,delinquency,newLeases,renewals,inquiries,applications,capexItems,avgEconOcc,rentRollRows,rentRollHeaders:rrHeaders,incomeRows,monthCols,expenseCategories:extractExpenseCats(incomeRows)};
    state.narratives = genNarratives(state.metrics);
    state.step=1; state._savedThisStep=false; render();
  } catch(e){ showError("Error: "+e.message); }
}

// Order matters — more specific patterns must come before substrings of themselves
const CHART_MAP = [

  { key:"chart_noi",               match:"net operating income" },
  { key:"chart_operating_income",  match:"operating income" },

function loadAllCharts(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".png,.jpg,.jpeg"; inp.multiple=true;
  inp.onchange=e=>{
    const files=Array.from(e.target.files); if(!files.length) return;
    let matched=0, unmatched=[];
    let pending=files.length;
    files.forEach(f=>{
      const name=f.name.replace(/\.[^.]+$/,"").toLowerCase().trim();
      // Find first matching rule (most-specific-first order)
      const rule=CHART_MAP.find(r=>name.includes(r.match));
      if(!rule){ unmatched.push(f.name); pending--; if(pending===0){afterLoad(matched,unmatched);} return; }
      const r=new FileReader();

    });

      saveChartsForKey(currentSaveKey(),state.charts);

      if(unmatched.length>0) showError("Could not match "+unmatched.length+" file(s): "+unmatched.join(", ")+". Check filenames and try uploading manually.");

// ─── APPFOLIO BULK FILE UPLOAD ────────────────────────────────────────────────
// AppFolio exports use snake_case filenames (e.g. rent_roll-20260401.csv).
// When multiple rent rolls share the same download date, AppFolio appends (1),(2)
// for duplicates. Base file = Month 1, (1) = Month 2, (2) = Month 3.
// rrSuffix() extracts that number so rent rolls sort into the correct monthly slots.
const rrSuffix=fname=>{const m=(fname||"").match(/\((\d+)\)/);return m?parseInt(m[1]):0;};
function loadAllRentRolls(){
  const inp=document.createElement("input");
  inp.type="file";
  inp.accept=".xlsx,.xls,.csv,.tsv,.txt";
  inp.multiple=true;
  inp.onchange=e=>{

    if(!files.length) return;
    const rrFiles=[...files];
    rrFiles.sort((a,b)=>rrSuffix(a.name)-rrSuffix(b.name));
    const keys=["rr1","rr2","rr3"];
    let pending=Math.min(rrFiles.length,3);
    if(!pending){showError("No files selected.");return;}
    rrFiles.slice(0,3).forEach((f,i)=>{
      const r=new FileReader();
      r.onload=ev=>{
        state.files[keys[i]]=ev.target.result;
        tryAutoFillPropertyName(ev.target.result);
        pending--;
        if(pending===0){render();showError("");}
      };
      r.readAsText(f);
    });
    if(rrFiles.length>3)
      showError("Only the first 3 files were loaded as rent rolls. Extra files ignored.");
  };
  inp.click();
}
function loadAllAFFiles(){
  const inp=document.createElement("input");
  inp.type="file";
  inp.accept=".xlsx,.xls,.csv,.tsv,.txt";
  inp.multiple=true;
  inp.onchange=e=>{
    const files=Array.from(e.target.files);
    if(!files.length) return;
    // Normalise: underscores→spaces and lowercase, so "rent_roll" matches "rent roll"
    const norm=s=>s.replace(/_/g," ").toLowerCase();
    const has=(fname,...terms)=>terms.some(t=>norm(fname).includes(t));
    const assigned={};
    const rrFiles=[];
    const unmatched=[];
    files.forEach(f=>{
      const base=f.name.replace(/\.[^.]+$/,"");
      const ext=f.name.split(".").pop().toLowerCase();
      const isExcel=["xlsx","xls"].includes(ext);
      if(has(base,"income statement","profit and loss","profit loss","p&l","owner statement","income_statement","profit_loss","cash flow 12 month","cash_flow_12_month"))
        {assigned.income={file:f,asBuffer:isExcel};return;}
      if(has(base,"rent roll"))
        {rrFiles.push(f);return;}
      if(has(base,"leasing summary","unit type leasing","leasing activity"))
        {assigned.leasingSummary={file:f,asBuffer:'text'};return;}
      if(has(base,"renewal summary","renewal notice"))
        {assigned.renewalSummary={file:f,asBuffer:'text'};return;}
      if(has(base,"trial balance"))
        {assigned.trialBalance={file:f,asBuffer:'text'};return;}
      if(has(base,"delinquency","delinquent"))
        {assigned.delinquency={file:f,asBuffer:'text'};return;}
      unmatched.push(f.name);
    });
    // Sort rent rolls: base file (no suffix, =0) → rr1, (1) → rr2, (2) → rr3
    rrFiles.sort((a,b)=>rrSuffix(a.name)-rrSuffix(b.name));
    rrFiles.forEach((f,i)=>{
      if(i<3) assigned[["rr1","rr2","rr3"][i]]={file:f,asBuffer:'text'};
      else unmatched.push(f.name);
    });
    const toRead=Object.entries(assigned);
    if(!toRead.length){showError("No files matched. Expected AppFolio filenames containing: rent_roll, income_statement, leasing_summary, trial_balance, renewal_summary, or delinquency.");return;}
    let pending=toRead.length,matchedCount=0;
    toRead.forEach(([key,{file,asBuffer}])=>{
      const isXL=["xlsx","xls"].includes(file.name.split(".").pop().toLowerCase());
      const finish=result=>{
        state.files[key]=result;
        if(["rr1","rr2","rr3"].includes(key)&&typeof result==="string")
          tryAutoFillPropertyName(result);
        matchedCount++;
        pending--;
        if(pending===0){
          render();
          if(unmatched.length>0)
            showError("Matched "+matchedCount+" of "+files.length+" files. Could not auto-match: "+unmatched.join(", ")+". Upload those individually.");
          else showError("");
        }
      };
      if(asBuffer==='text' && isXL){
        const r=new FileReader();
        r.onload=ev=>finish(xlsxToText(ev.target.result));
        r.readAsArrayBuffer(file);
      } else {
        const r=new FileReader();
        r.onload=ev=>finish(ev.target.result);
        asBuffer===true?r.readAsArrayBuffer(file):r.readAsText(file);
      }
    });
  };
  inp.click();
}

function photoStorageKey(name){ return "lw_photo_" + (name||"").trim().toLowerCase().replace(/[^a-z0-9]/g,"_"); }
// Resize and re-encode a photo as JPEG before storing — keeps size small for efficient IndexedDB storage.
// Max 1200px on the long edge, 80% quality — plenty of detail for a report cover photo.
function compressPhoto(dataUri, cb){
  const img=new Image();
  img.onload=()=>{
    const MAX=1200;
    let w=img.width, h=img.height;
    if(w>h){ if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} } else { if(h>MAX){w=Math.round(w*MAX/h);h=MAX;} }
    const canvas=document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg',0.80));
  };
  img.onerror=()=>cb(dataUri); // fall back to original if decode fails
  img.src=dataUri;
}
function savePhotoForProperty(name, dataUri){
  if(!name||!dataUri) return;
  dbSet(photoStorageKey(name), dataUri);
}
function loadPhotoForProperty(name){
  if(!name) return null;
  try{
    // Compute once and reuse — avoids two calls to photoStorageKey in the same lookup
    const targetKey=photoStorageKey(name);
    // Exact match first
    const exact=dbGet(targetKey);
    if(exact) return exact;
    // Fuzzy: scan all lw_photo_* keys — find one where the stored name contains
    // our lookup name as a substring (or vice versa), min 5 chars to avoid false matches
    const norm=targetKey.slice("lw_photo_".length);
    let best=null, bestScore=0;
    for(const k of dbKeys()){
      if(!k.startsWith("lw_photo_")) continue;
      const stored=k.slice("lw_photo_".length);
      const score=stored.includes(norm)?norm.length:(norm.includes(stored)?stored.length:0);
      if(score>=5&&score>bestScore){best=k;bestScore=score;}
    }
    return best?dbGet(best):null;
  } catch(e){ return null; }
}
function removePhotoForProperty(name){
  if(!name) return;
  dbRemove(photoStorageKey(name));
}

          expenseCategories:data.metrics.expenseCategories||[]  // FIX: was missing, broke Q/Q expense narrative
        };
        state.prevQuarterLabel=prevLabel;
      }
      return true;
    }
  }catch(e){}
  return false;
}
function onPropertyNameChange(val){
  const oldName=state.propertyName;
  state.propertyName=val;
  // Prevent photo orphaning: if we have a photo in memory and the name changed,
  // write it under the new key so it's always findable by exact match.
  if(oldName && val && oldName!==val && state.propertyPhoto){
    savePhotoForProperty(val, state.propertyPhoto);
  }
  // Helper: re-render while restoring focus to whatever field was active
  const renderKeepFocus=()=>{
    const activeField=document.activeElement?document.activeElement.getAttribute('data-field'):null;
    const activeSel=document.activeElement?document.activeElement.selectionStart:null;
    render();
    if(activeField){
      const el=document.querySelector('[data-field="'+activeField+'"]');
      if(el){el.focus();try{el.setSelectionRange(activeSel,activeSel);}catch(e){}}
    }
  };
  // Auto-load saved photo for this property if none currently set
  if(!state.propertyPhoto){
    const saved=loadPhotoForProperty(val);
    if(saved){ state.propertyPhoto=saved; renderKeepFocus(); }
  }
  // Auto-load saved asset facts for this property
  if(!state.assetFacts||Object.keys(state.assetFacts).length===0){
    const savedFacts=loadAssetFactsForProperty(val);
    if(savedFacts){ state.assetFacts=savedFacts; renderKeepFocus(); }
  }
  // Auto-load prior quarter occupancy from a saved report
  if(!state.prevOccupancyInput){ tryAutoLoadPriorOccupancy(); }
}

// ─── 12-MONTH INCOME STATEMENT PARSERS ────────────────────────────────────────
// parseQuarterFromExcel: Reads a 12-month AppFolio income statement and returns
// financials for the SPECIFIED quarter only (summing just those 3 month columns).
// This replaces parseExcel for AppFolio so we don't accidentally return annual totals.
function parseQuarterFromExcel(buffer, currentQuarter) {
  try {
    const wb = XLSX.read(buffer, {type:"array", cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
    // monthPat: matches named months, MM-YYYY, YYYY-MM, and 2-digit year variants (Jan-26, 01-26)
    const monthPat = /^(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|\d{1,2}[-\/]\d{2,4}|\d{4}[-\/]\d{1,2})/i;
    const MO_ABBR = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    // Helper: extract {monthIdx 0-11, year 4-digit} from any column label format
    const parseColMonth = lbl => {
      const s = String(lbl).trim();
      // MM-YYYY or MM/YYYY
      const nm4 = s.match(/^(\d{1,2})[-\/](\d{4})$/);
      if(nm4) return {monthIdx:parseInt(nm4[1])-1, year:parseInt(nm4[2])};
      // YYYY-MM or YYYY/MM
      const ny = s.match(/^(\d{4})[-\/](\d{1,2})$/);
      if(ny) return {monthIdx:parseInt(ny[2])-1, year:parseInt(ny[1])};
      // Named month (Jan/January etc.) with 4-digit or 2-digit year
      const MO_L=["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
      const mi=MO_L.findIndex(m=>s.toLowerCase().startsWith(m));
      if(mi>=0){
        const yrM4=s.match(/\d{4}/);
        if(yrM4) return {monthIdx:mi, year:parseInt(yrM4[0])};
        const yrM2=s.match(/(\d{2})$/);
        if(yrM2) return {monthIdx:mi, year:2000+parseInt(yrM2[1])};
      }
      // MM-YY or MM/YY (2-digit year)
      const nm2=s.match(/^(\d{1,2})[-\/](\d{2})$/);
      if(nm2) return {monthIdx:parseInt(nm2[1])-1, year:2000+parseInt(nm2[2])};
      return null;
    };
    // Find header row (search up to row 20 to accommodate metadata rows)
    let headerRowIdx = -1, allMonthCols = [];
    for(let i = 0; i < Math.min(20, rows.length); i++) {
      const hits = rows[i].map((c,idx) => ({c:normXlCell(c), idx})).filter(({c}) => monthPat.test(c));
      if(hits.length >= 3) { headerRowIdx = i; allMonthCols = hits.map(({c,idx}) => ({label:c, colIdx:idx})); break; }
    }
    if(headerRowIdx < 0) return null;
    // Identify current quarter's 3 months
    const qMatch = currentQuarter.match(/Q([1-4])\s*(\d{4})/i);
    if(!qMatch) return null;
    const qNum = parseInt(qMatch[1]), yr = parseInt(qMatch[2]);
    const qMonthMap = {1:[0,1,2], 2:[3,4,5], 3:[6,7,8], 4:[9,10,11]};
    const curMoIdxs = qMonthMap[qNum];
    const curYr2 = String(yr).slice(2); // 2-digit year fallback
    const curColIdxs = curMoIdxs.map(mi => {
      const col = allMonthCols.find(c => {
        const p = parseColMonth(c.label);
        if(p) return p.monthIdx===mi && p.year===yr;
        return c.label.toLowerCase().startsWith(MO_ABBR[mi].toLowerCase()) &&
          (c.label.includes(String(yr)) || c.label.includes(curYr2));
      });
      return col ? col.colIdx : null;
    }).filter(v => v !== null);
    if(curColIdxs.length < 3) return null;
    // Month columns for income statement display (only current quarter)
    const monthCols = curMoIdxs.map((mi, i) => ({label: MO_ABBR[mi], colIdx: curColIdxs[i]}));
    const pC = v => { if(v===null||v===undefined||v==="") return 0; const n=parseFloat(String(v).replace(/[$,()]/g,"").trim()); return isNaN(n)?0:(String(v).includes("(")?-n:n); };
    // First pass: collect names that have a "Total X" counterpart — these are genuine section groupings.
    // e.g. "Total RENTS" → "rents" is a grouping header; "Prepaid Rent" has no Total row → it's a line item.
    const SKIP_TOTALS = new Set(["total operating income","total income","total operating expense","total capital expenses","total for capital improvements","noi - net operating income","net operating income","net income"]);
    const sectionGroupNames = new Set();
    for(const row of rows.slice(headerRowIdx+1)){
      const lbl = String(row[0]||"").trim().toLowerCase().replace(/\s+/g," ");
      if(lbl.startsWith("total ") && !SKIP_TOTALS.has(lbl))
        sectionGroupNames.add(lbl.replace(/^total\s+/,"").trim());
    }
    let totalIncome=0, totalExpense=0, noi=0, capex=0, inCapex=false;
    let _tiSet=false, _teSet=false; // track whether operating-specific totals already found
    const capexItems=[], incomeRows=[];
    for(const row of rows.slice(headerRowIdx+1)) {
      const rawLabel = String(row[0]||"").trimEnd();
      const label = rawLabel.trim().toLowerCase().replace(/\s+/g," ");
      if(!label) continue;
      const monthAmounts = curColIdxs.map(ci => pC(row[ci]||0));
      const quarterTotal = monthAmounts.reduce((s,v)=>s+v, 0);
      // Key totals — prioritise "Total Operating X" so AppFolio's later aggregate "Total X" rows
      // (which include capital expenses, mortgage, etc.) don't overwrite the correct values.
      if(label==="total operating income"){totalIncome=quarterTotal;_tiSet=true;}
      else if(label==="total income"&&!_tiSet) totalIncome=quarterTotal;
      if(label==="total operating expense"||label==="total operating expenses"){totalExpense=quarterTotal;_teSet=true;}
      else if((label==="total expense"||label==="total expenses")&&!_teSet) totalExpense=quarterTotal;
      // noi calculated below from totalIncome - totalExpense to avoid Buildium labelling differences
      if(label==="capital expenses"||label==="capital improvements") inCapex = true;
      if(label==="total capital expenses"||label==="total for capital improvements") { capex=quarterTotal; inCapex=false; }
      if(inCapex && label && !label.startsWith("total") && quarterTotal!==0 && label!=="capital expenses" && label!=="capital improvements") {
        capexItems.push({name:rawLabel.trim(), amount:quarterTotal});
      }
      // Income statement rows for report display
      const allZero = monthAmounts.every(v=>v===0);
      const isTotal = label.startsWith("total")||label==="noi - net operating income"||label==="net income";
      const indentCount = rawLabel.length - rawLabel.trimStart().length;
      const indent = indentCount > 0 ? 1 : 0;
      // A row is a section header only if: all amounts are zero (across all months), it's not a
      // total row, AND it has a matching "Total X" row elsewhere in the statement.
      // NOTE: indentCount is intentionally NOT used here — low-indent zero-amount line items
      // (e.g. "  Pest Control" with $0 in all months) must be excluded, not shown as headers.
      const isSectionHeader = allZero && !isTotal && sectionGroupNames.has(label);
      incomeRows.push({label:rawLabel.trim(), amount:quarterTotal||null, monthAmounts, indent, indentCount, isTotal, isSectionHeader});
    }
    if(totalIncome || totalExpense) noi = totalIncome - totalExpense;
    return {totalIncome, totalExpense, noi, capex, capexItems, incomeRows, monthCols};
  } catch(e) { return null; }
}
// parsePriorQuarterFromExcel: Extracts PRIOR quarter metrics from a 12-month income statement.
function parsePriorQuarterFromExcel(buffer, currentQuarter) {
  try {
    const wb = XLSX.read(buffer, {type:"array", cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
    const MO_ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    // monthPat: matches named months, MM-YYYY, YYYY-MM, and 2-digit year variants (Jan-26, 01-26)
    const monthPat = /^(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|\d{1,2}[-\/]\d{2,4}|\d{4}[-\/]\d{1,2})/i;
    // parseColMonth: extract {monthIdx 0-11, year 4-digit} from any Buildium column label format
    const parseColMonth = lbl => {
      const s = String(lbl).trim();
      // MM-YYYY or MM/YYYY
      const nm4 = s.match(/^(\d{1,2})[-\/](\d{4})$/);
      if(nm4) return {monthIdx:parseInt(nm4[1])-1, year:parseInt(nm4[2])};
      // YYYY-MM or YYYY/MM
      const ny = s.match(/^(\d{4})[-\/](\d{1,2})$/);
      if(ny) return {monthIdx:parseInt(ny[2])-1, year:parseInt(ny[1])};
      // Named month (Jan/January etc.) with 4-digit or 2-digit year
      const MO_L=["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
      const mi=MO_L.findIndex(m=>s.toLowerCase().startsWith(m));
      if(mi>=0){
        const yrM4=s.match(/\d{4}/);
        if(yrM4) return {monthIdx:mi, year:parseInt(yrM4[0])};
        const yrM2=s.match(/(\d{2})$/);
        if(yrM2) return {monthIdx:mi, year:2000+parseInt(yrM2[1])};
      }
      // MM-YY or MM/YY (2-digit year)
      const nm2=s.match(/^(\d{1,2})[-\/](\d{2})$/);
      if(nm2) return {monthIdx:parseInt(nm2[1])-1, year:2000+parseInt(nm2[2])};
      return null;
    };
    // Search up to row 20 (consistent with parseQuarterFromExcel)
    let headerRowIdx = -1, monthCols = [];
    for(let i=0; i<Math.min(20,rows.length); i++){
      const hits = rows[i].map((c,idx)=>({c:normXlCell(c),idx})).filter(({c})=>monthPat.test(c));
      if(hits.length >= 3){ headerRowIdx=i; monthCols=hits.map(({c,idx})=>({label:c,colIdx:idx})); break; }
    }
    if(headerRowIdx<0 || monthCols.length<3){
      showError("Warning: Prior quarter comparison — could not find month column headers in the income statement. Prior quarter data will be blank. Make sure the uploaded file is a trailing 12-month income statement.");
      return null;
    }
    // Identify current quarter months
    const qMatch = currentQuarter.match(/Q([1-4])\s*(\d{4})/i);
    if(!qMatch) return null;
    const qNum=parseInt(qMatch[1]), yr=parseInt(qMatch[2]);
    const qMonthMap={1:[0,1,2],2:[3,4,5],3:[6,7,8],4:[9,10,11]};
    const prevQNum = qNum===1?4:qNum-1;
    const prevYr = qNum===1?yr-1:yr;
    const prevMoIdxs = qMonthMap[prevQNum];
    const expectedMonths = prevMoIdxs.map(mi=>MO_ABBR[mi]+" "+prevYr).join(", ");
    // Find column indices for prior quarter months
    const prevColIdxs = prevMoIdxs.map(mi=>{
      const col = monthCols.find(c=>{
        const p=parseColMonth(c.label);
        if(p) return p.monthIdx===mi && p.year===prevYr;
        // Fallback: label starts with month name and contains year (4-digit or 2-digit)
        const prevYr2=String(prevYr).slice(2); // e.g. "25" for 2025
        return c.label.toLowerCase().startsWith(MO_ABBR[mi].toLowerCase())&&
          (c.label.includes(String(prevYr))||c.label.includes(prevYr2));
      });
      return col?col.colIdx:null;
    }).filter(v=>v!==null);
    if(prevColIdxs.length < 3){
      const foundLabels = monthCols.slice(0,6).map(c=>c.label).join(", ")+(monthCols.length>6?" ...":"");
      showError("Warning: Prior quarter columns ("+expectedMonths+") not found in income statement. Columns found: "+foundLabels+". Prior quarter comparison will be blank. Verify the trailing 12-month file covers the prior quarter period.");
      return null;
    }
    // Sum prior quarter values for key rows

    let prevIncome=0, prevExpense=0, prevNoi=0, prevCapex=0;
    let inExpenseSection=false, _prevTeSet=false, _prevTiSet=false;
    const prevExpenseCats=[];
    const dataRows = rows.slice(headerRowIdx+1);
    for(const row of dataRows){
      const rawLabel = String(row[0]||row[1]||"").trimEnd();
      const label = rawLabel.trim().toLowerCase().replace(/\s+/g," ");
      const colSum = prevColIdxs.reduce((s,ci)=>s+parseCur(row[ci]),0);
      // Income: prioritise "total operating income" over later aggregate "total income"
      if(label==="total operating income"){prevIncome=colSum;_prevTiSet=true;inExpenseSection=true;continue;}
      else if(label==="total income"&&!_prevTiSet){prevIncome=colSum;inExpenseSection=true;continue;}
      // Expense: prioritise "total operating expense" so AppFolio's "total expense" row doesn't overwrite
      if(label==="total operating expense"||label==="total operating expenses"){prevExpense=colSum;_prevTeSet=true;inExpenseSection=false;}
      else if((label==="total expense"||label==="total expenses")&&!_prevTeSet){prevExpense=colSum;inExpenseSection=false;}
      if(label==="noi - net operating income"||label==="net operating income"||label==="net income"||
         label.startsWith("net non-operating")){ if(label.includes("noi")||label==="net operating income") prevNoi=colSum; inExpenseSection=false; }
      if(label==="total capital expenses"||label==="total for capital improvements") prevCapex=colSum;
      // Individual line items only: not a "Total X" row, not a summary/NOI row
      if(inExpenseSection && !label.startsWith("total") && !EXPENSE_NARRATIVE_EXCLUDE.has(label) && Math.abs(colSum)>0){
        prevExpenseCats.push({ name:rawLabel.trim(), amount:colSum });
      }
    }
    if(prevIncome || prevExpense) prevNoi = prevNoi || (prevIncome - prevExpense);
    const prevLabel = `Q${prevQNum} ${prevYr}`;
    return { income:prevIncome, expenses:prevExpense, noi:prevNoi, capex:prevCapex, occupancy:0, prevLabel, expenseCategories:prevExpenseCats };
  } catch(e){ return null; }
}
// ─── CAPEX DETAIL PARSER ──────────────────────────────────────────────────────
// parseCapexDetail: Scans a Buildium "Transaction Detail by Account" report (Excel or CSV).
//
// File structure (Buildium format):
//   Row 1: Title row
//   Row 4: Column headers — Date | Type | Property or Company | Name | Description | Amount
//   Data rows are grouped under section header rows (e.g. "Capital Improvements - Labor - General")
//   where only the first column has a value; all other columns are empty.
//
// Strategy: track the current section, then within any "Capital Improvements" section
// find transaction rows whose Description contains "remodel". Unit numbers are parsed
// from the Name column (e.g. "Unit 955-3 - Turnkey Make Readies" → "955-3").
//
// Returns { remodelCount, remodelUnits: ["955-3", ...], unnamedCount }
function parseCapexDetail(fileData) {
  if(!fileData) return null;
  try {
    let rawRows = [];
    if(fileData instanceof ArrayBuffer) {
      const wb = XLSX.read(fileData, {type:"array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      rawRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
    } else {
      // CSV: split into arrays manually so section-header rows are preserved correctly
      rawRows = fileData.split(/\r?\n/).map(line=>{
        const cells=[], re=/("(?:[^"]|"")*"|[^,]*)/g; let m;
        while((m=re.exec(line))!==null && m.index<line.length)
          cells.push(m[1].replace(/^"|"$/g,"").replace(/""/g,'"'));
        return cells;
      });
    }
    if(!rawRows.length) return null;

    // Find the header row (contains "Date", "Name", "Description")
    let colDate=-1, colName=-1, colDesc=-1, headerRowIdx=-1;
    for(let i=0; i<Math.min(20,rawRows.length); i++){
      const row = rawRows[i].map(c=>String(c||"").trim().toLowerCase());
      if(row.includes("description") && row.includes("name")){
        headerRowIdx=i;
        colDate=row.findIndex(c=>c==="date");
        colName=row.findIndex(c=>c==="name");
        colDesc=row.findIndex(c=>c==="description");
        break;
      }
    }
    if(headerRowIdx<0) return null;

    const remodelUnits=[];
    let inCapitalSection=false;

    for(let i=headerRowIdx+1; i<rawRows.length; i++){
      const row=rawRows[i];
      const col0=String(row[0]||"").trim();
      const col0L=col0.toLowerCase();

      // Section header rows: first column has text, Name and Description columns are empty
      // (Date column will be a real date for data rows, not a plain string)
      const dateVal = row[colDate>=0?colDate:0];
      const isRealDate = dateVal instanceof Date || typeof dateVal==="number" ||
                         /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(String(dateVal));
      const nameVal  = String(row[colName>=0?colName:3]||"").trim();
      const isSectionRow = col0 && !isRealDate && !nameVal;

      if(isSectionRow){
        if(col0L.startsWith("total for")) { inCapitalSection=false; }
        else { inCapitalSection = col0L.includes("capital improvements"); }
        continue;
      }
      if(!inCapitalSection) continue;

      const desc = String(row[colDesc>=0?colDesc:4]||"").replace(/^"|"$/g,"").trim();
      const name = String(row[colName>=0?colName:3]||"").trim();

      // Look for "remodel" in description (primary) or name (fallback)
      if(!desc.toLowerCase().includes("remodel") && !name.toLowerCase().includes("remodel")) continue;

      // Extract unit from Name column: "Unit 955-3 - Turnkey Make Readies" → "955-3"
      // Handles formats: "Unit 101", "Unit 955-3", "Apt 4B", "#101"
      const unitM = name.match(/(?:unit|apt(?:artment)?)\s+#?([A-Za-z0-9]+(?:-[A-Za-z0-9]+)?)/i)
                 || name.match(/#([A-Za-z0-9]+(?:-[A-Za-z0-9]+)?)/);
      const unit = unitM ? unitM[1].toUpperCase() : null;

      // Deduplicate by unit id
      const key = unit || ("__noid_"+i);
      if(!remodelUnits.find(u=>u.id===key)){
        remodelUnits.push({id:key, label:unit, desc, name});
      }
    }

    const namedUnits = remodelUnits.filter(u=>u.label).map(u=>u.label);
    const unnamedCount = remodelUnits.filter(u=>!u.label).length;
    return { remodelCount:remodelUnits.length, remodelUnits:namedUnits, unnamedCount };
  } catch(e){ return null; }
}

// Reads the "-> Property Name - 123 Street Address" row from an AppFolio rent roll CSV
// and auto-fills state.propertyName if it hasn't been set yet.
function tryAutoFillPropertyName(csvText){
  if(state.propertyName) return; // don't overwrite a name the user already entered
  const lines=(csvText||"").split("\n");
  for(const line of lines){
    const clean=line.replace(/^"|"$/g,"").trim();
    if(!clean.startsWith("->")) continue;
    // Pattern 1 (original): "-> Property Name - 123 Street"
    const m1=clean.match(/^->\s*(.+?)\s*-\s*\d+\s+\S/);
    if(m1){ state.propertyName=m1[1].trim(); render(); return; }
    // Pattern 2: "-> Property Name" with no address, or address without a leading digit
    // Capture everything after "-> " up to the first comma, pipe, or end of meaningful content
    const m2=clean.match(/^->\s*(.+?)(?:\s*[,|].*)?$/);
    if(m2&&m2[1].trim()){ state.propertyName=m2[1].trim(); render(); return; }
  }
}

function buildAssetFactsInputs(){

      </div>
      <div class="chart-grid">
        ${chartRow("chart_operating_income","Operating Income vs. Pro Forma")}
        ${chartRow("chart_operating_expense","Operating Expense vs. Pro Forma")}
        ${chartRow("chart_income_vs_expense","Operating Income vs. Expense")}
        ${chartRow("chart_noi","NOI vs. Pro Forma")}
        ${chartRow("chart_lease_expirations","Lease Expirations")}
        ${chartRow("chart_rent_growth","Rent Growth & Market Rent")}
        ${chartRow("chart_occupancy_rate","Occupancy Rate")}
        ${chartRow("chart_capital_expense","Capital Expense")}
        ${chartRow("chart_maintenance_expense","Maintenance Expense")}
        ${chartRow("chart_loss_to_lease","Loss to Lease")}
      </div>`;
      const afUploaded=Object.keys(state.files).filter(k=>["income","rr1","rr2","rr3","leasingSummary","renewalSummary","trialBalance","delinquency"].includes(k)&&state.files[k]).length;
      el.innerHTML = commonTop + `
      <div class="section-label">AppFolio Reports <span style="margin-left:8px;background:#fdf8ec;color:#96771f;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600">${afUploaded}/8 uploaded</span></div>
      <div style="background:#fdf8ec;border:1px solid #e8d49a;border-radius:10px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div>
          <div style="font-weight:600;font-size:13px;color:#1a1400;margin-bottom:3px">Bulk Upload All Reports</div>
          <div style="font-size:11px;color:#7a6420">Select all AppFolio export files at once — matched automatically by filename. Use individual rows below to override any file.</div>
        </div>
        <button class="upload-btn" style="white-space:nowrap;padding:8px 14px" onclick="loadAllAFFiles()">📂 Upload All Reports</button>
      </div>
      ${fileRow("income","Income Statement (12-Month)","Upload a 12-month statement for prior quarter comparison",true)}
      ${rrSection}
      ${fileRow("leasingSummary","Leasing Summary","Leasing Summary report for the quarter",'text')}
      ${fileRow("renewalSummary","Renewal Summary","Renewal Summary report for the quarter",'text')}
      ${fileRow("trialBalance","Trial Balance By Property","Current period trial balance",'text')}
      ${fileRow("delinquency","Delinquency As Of","Delinquency As Of report — current period",'text')}
      ${econBox}${chartsSection}
      ${!allUploaded?`<div style="background:#fef9ec;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:12px;color:#92400e;"><strong>Still needed:</strong> ${missingKeys.map(k=>FILE_LABELS[k]||k).join(', ')}</div>`:''}
      <button class="process-btn" ${allUploaded?"":"disabled"} onclick="processData()">Process Data →</button>`;
  }
  else if(state.step===1 && state.metrics){
    const m=state.metrics;
    const prev=state.prevMetrics||PREV_SAFE;
    el.innerHTML=`
      <h2 style="font-size:16px;font-weight:600;margin-bottom:14px">Review Calculated Metrics</h2>
      <div class="metric-box">
        <div class="metric-box-title">Q/Q Summary</div>
        <table>
          <thead><tr><th>Metric</th><th>${state.prevQuarterLabel||"Prior Quarter"}</th><th>${state.currentQuarter||""}</th><th>Change</th></tr></thead>
          <tbody>
            ${[["Avg Occupancy",prev.occupancy+"%",m.occupancy+"%",pct(m.occupancy,prev.occupancy)],
               ["Total Income",fmt(prev.income),fmt(m.totalIncome),pct(m.totalIncome,prev.income)],
               ["Operating Expenses",fmt(prev.expenses),fmt(m.totalExpense),pct(m.totalExpense,prev.expenses)],
               ["NOI",fmt(prev.noi),fmt(m.noi),pct(m.noi,prev.noi)],
               ["Capex",fmt(prev.capex),fmt(m.capex),pct(m.capex,prev.capex)]
              ].map(([l,q4,q1,chg])=>`<tr><td>${l}</td><td>${q4}</td><td><strong>${q1}</strong></td><td class="${chg.startsWith("+")?"chg-pos":"chg-neg"}">${chg}</td></tr>`).join("")}
          </tbody>
        </table>
      </div>
      <div class="metric-box">
        <div class="metric-box-title">Monthly Occupancy</div>
        <div class="occ-grid">
          ${(()=>{const mo=getQMonths(state.currentQuarter||"");return[[mo[0],m.occ1],[mo[1],m.occ2],[mo[2],m.occ3],["Average",m.occupancy]].map(([label,v],i)=>`<div class="occ-card${i===3?" highlight":""}"><div class="occ-card-label">${label}</div><div class="occ-card-value">${v}%</div></div>`).join("");})()}
        </div>
      </div>
      <div class="kpi-grid" style="margin-bottom:14px">
        ${[["Cash on Hand",fmt(m.cashOnHand)],["Total Delinquency",fmt(m.delinquency)],["Loss to Lease",fmt(m.lossToLease)],["New Leases",m.newLeases],["Renewals",m.renewals],["Inquiries",m.inquiries],["Applications",m.applications],["Avg Econ. Occupancy",m.avgEconOcc?m.avgEconOcc+"%":"Not entered"]]
          .map(([l,v])=>`<div class="kpi-card"><div class="kpi-label">${l}</div><div class="kpi-value">${v}</div></div>`).join("")}
      </div>
      ${m.capexItems.length?`
        <div class="metric-box">
          <div class="metric-box-title">Capital Improvements</div>
          ${m.capexItems.map(i=>`<div class="capex-row"><span>${i.name}</span><span style="font-weight:600">${fmtWhole(i.amount)}</span></div>`).join("")}
        </div>`:"" }
      <div class="btn-row">
        <button class="btn-back" onclick="state.step=0;render()">← Back</button>
        <button class="save-btn" onclick="saveProgress()">💾 Save</button>
        <button class="btn-next" onclick="confirmAndAdvance(2)">Looks Good → Review Narratives</button>
      </div>`;
  }
  else if(state.step===2 && state.metrics && !state.reportHTML){
    el.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
          <h2 style="font-size:16px;font-weight:600;margin-bottom:4px">Auto-Generated Narratives</h2>
          <p style="font-size:13px;color:#9ca3af;margin:0">Written from your data. Edit before generating if needed.</p>
        </div>
        <button style="font-size:11px;font-weight:600;color:#96771f;background:#fdf8ec;border:1px solid #e8d49a;border-radius:5px;padding:5px 11px;cursor:pointer;white-space:nowrap;font-family:Inter,sans-serif;flex-shrink:0;margin-left:12px" onclick="if(confirm('Overwrite current narratives with freshly generated text?')){state.narratives=genNarratives(state.metrics);render()}" title="Re-run narrative generation with the latest code">↺ Refresh Narratives</button>
      </div>
      ${[["income","Income & Occupancy"],["expenses","Expenses"],["capex","Capital Expenditures"],["outlook","Outlook"]].map(([k,l])=>`
        <div>
          <span class="narrative-label">${l}<span class="auto-badge">AUTO</span></span>
          <textarea id="narr-${k}" oninput="state.narratives['${k}']=this.value">${state.narratives[k]}</textarea>
        </div>`).join("")}
      <div class="charts-info">📊 <strong>${chartsN}/10 charts uploaded</strong> — ${chartsN===10?"All charts ready!":"Missing charts will show placeholders."}</div>
      <div class="btn-row">
        <button class="btn-back" onclick="state.step=1;render()">← Back</button>
        <button class="save-btn" onclick="saveProgress()">💾 Save</button>
        <button class="gen-btn btn-next" style="flex:2" ${state.generating?"disabled":""} onclick="confirmAndGenerate()">
          ${state.generating?`<span class="spinner"></span> Building Report...`:"🖨️ Generate Report"}
        </button>
      </div>`;
  }
  else if(state.step===2 && state.reportHTML){
    el.innerHTML=`
      <div class="report-ready-header">
        <div>
          <h2 style="font-size:16px;font-weight:600;margin:0">✅ Report Ready!</h2>
          <p style="font-size:12px;color:#9ca3af;margin:4px 0 0">Preview below — click Print to save as PDF.</p>
        </div>
        <div style="display:flex;gap:8px">
          ${getSavesIndex().length>0?`<button class="btn-home" onclick="state.showHome=true;render()">🏠 All Reports</button>`:""}
          <button class="btn-back" style="white-space:nowrap" onclick="state.reportHTML=null;render()">← Edit</button>
          <button class="save-btn" onclick="saveProgress()">💾 Save</button>
          <button class="btn-next" style="flex:none;padding:8px 16px;font-size:13px" onclick="printReport()">🖨️ Print / Save PDF</button>
        </div>
      </div>
      <div class="print-instructions">
        <strong>📄 To save as PDF:</strong> Click <strong>Print / Save PDF</strong> above → set Destination to <strong>Save as PDF</strong> → click Save.
      </div>
      <div style="width:100%;height:820px;border:1px solid #e8d49a;border-radius:8px;overflow:hidden;">
        <iframe id="preview-frame" srcdoc="" style="width:100%;height:100%;border:none;"></iframe>
      </div>
      <iframe id="print-frame" srcdoc="" style="position:fixed;top:-9999px;left:-9999px;width:816px;height:1056px;border:none;visibility:hidden;"></iframe>
      <div style="display:flex;gap:8px;margin-top:10px">
        ${getSavesIndex().length>0?`<button class="new-quarter-btn" style="background:white;color:#1a1400;border:1.5px solid #e8d49a;margin-top:0" onclick="state.showHome=true;render()">🏠 All Reports</button>`:""}
        <button class="new-quarter-btn" style="margin-top:0" onclick="if(confirm('Start new quarter? Clears all data.')){resetAll()}">+ Start New Quarter</button>
      </div>`;
    setTimeout(()=>{
      const preview=document.getElementById("preview-frame");
      const printFr=document.getElementById("print-frame");
      if(preview) preview.srcdoc=state.reportHTML;
      if(printFr) printFr.srcdoc=state.reportHTML;
    },50);
  }
}
function calcEconAvg(){
  const {m1,m2,m3}=state.econOcc;
  if(m1&&m2&&m3) return "Average: "+Math.round((parseFloat(m1)+parseFloat(m2)+parseFloat(m3))/3).toString()+"%";
  return "";
}
function resetAll(){
  state={...state,showHome:getSavesIndex().length>0,source:null,step:0,propertyName:"",currentQuarter:"",prevQuarterLabel:"",assetFacts:null,files:{income:null,rr1:null,rr2:null,rr3:null,leasing:null,leasingSummary:null,renewalSummary:null,bank:null,trialBalance:null,delinquency:null,rentEngine:null,capexDetail:null},charts:{chart_operating_income:null,chart_operating_expense:null,chart_income_vs_expense:null,chart_noi:null,chart_lease_expirations:null,chart_rent_growth:null,chart_occupancy_rate:null,chart_capital_expense:null,chart_maintenance_expense:null,chart_loss_to_lease:null},econOcc:{m1:"",m2:"",m3:""},prevMetrics:null,propertyPhoto:null,metrics:null,narratives:{income:"",expenses:"",capex:"",outlook:""},reportHTML:null,generating:false,
  investmentName:"",invProperties:[],invCharts:{inv_operating_income:null,inv_operating_expense:null,inv_income_by_property:null,inv_expense_by_property:null,inv_income_vs_expense:null,inv_noi:null,inv_noi_by_property:null,inv_utility:null,inv_lease_expirations:null,inv_rent_growth:null,inv_occupancy_rate:null,inv_occupancy_by_property:null},invNarratives:{income:"",expenses:"",outlook:""},invMetrics:null,invReportHTML:null,invLoan:{principalInception:"",principalInceptionDate:"",principalCurrent:"",principalCurrentDate:"",writeoffs:""},invPrevMetrics:null,prevOccupancyInput:""};
  render();
}
// Startup: open IndexedDB, load cache, migrate any legacy localStorage data, then render
let _appStarted=false;
function startApp(){
  if(_appStarted) return;
  _appStarted=true;
  migrateLegacyData();
  state.showHome = getSavesIndex().length > 0;
  render();
}
idbInit(startApp);
// Hard fallback: script is at end of body so DOM is already ready.
// If idbInit hasn't fired within 1.5s, force render anyway.
setTimeout(startApp, 1500);
const _logoEl=document.getElementById('lw-header-logo');
if(_logoEl) _logoEl.src = LOGO_SYMBOL;
</script>
</body>
</html>
